<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111B32"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1C2742"/>
      <stop offset="1" stop-color="#10192F"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="32" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="32" fill="url(#bg)"/>
  <circle cx="186" cy="110" r="120" fill="#1D4ED8" fill-opacity="0.15"/>
  <circle cx="1035" cy="560" r="160" fill="#22C55E" fill-opacity="0.10"/>

  <text x="72" y="84" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">telegram-ai-bridge</text>
  <text x="72" y="126" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="22">Turn Telegram into the remote control for your local AI coding agent</text>

  <g filter="url(#shadow)">
    <rect x="72" y="188" width="246" height="388" rx="32" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <rect x="92" y="224" width="206" height="308" rx="24" fill="url(#card)"/>
    <text x="118" y="266" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Telegram</text>
    <text x="118" y="296" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Your phone becomes the control panel</text>

    <rect x="118" y="330" width="154" height="54" rx="16" fill="#1D4ED8"/>
    <text x="145" y="364" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">/status</text>

    <rect x="118" y="400" width="154" height="54" rx="16" fill="#0EA5E9"/>
    <text x="145" y="434" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">/resume</text>

    <rect x="118" y="470" width="154" height="54" rx="16" fill="#22C55E"/>
    <text x="147" y="504" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">/model</text>
  </g>

  <g>
    <path d="M347 378H518" stroke="#60A5FA" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 14"/>
    <polygon points="518,378 492,362 492,394" fill="#60A5FA"/>
    <text x="383" y="352" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Telegram bridge</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="214" width="284" height="330" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="552" y="260" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Local machine</text>
    <text x="552" y="294" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">The real AI agent still runs here</text>

    <rect x="552" y="334" width="220" height="68" rx="20" fill="#0F172A" stroke="#475569"/>
    <text x="578" y="376" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">start.js / bridge.js</text>

    <rect x="552" y="424" width="118" height="44" rx="14" fill="#1E293B"/>
    <text x="576" y="452" fill="#BFDBFE" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">config.json</text>

    <rect x="682" y="424" width="90" height="44" rx="14" fill="#1E293B"/>
    <text x="704" y="452" fill="#A7F3D0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">SQLite</text>

    <text x="552" y="508" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">One bot • one backend • one mental model</text>
  </g>

  <g>
    <path d="M832 378H1012" stroke="#86EFAC" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 14"/>
    <polygon points="1012,378 986,362 986,394" fill="#86EFAC"/>
    <text x="864" y="352" fill="#BBF7D0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Choose one backend</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="864" y="214" width="264" height="330" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="898" y="260" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Backend</text>
    <text x="898" y="294" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">Run one bot for one agent</text>

    <rect x="898" y="334" width="194" height="54" rx="18" fill="#7C3AED"/>
    <text x="962" y="368" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Claude</text>

    <rect x="898" y="404" width="194" height="54" rx="18" fill="#16A34A"/>
    <text x="968" y="438" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Codex</text>

    <rect x="898" y="474" width="194" height="54" rx="18" fill="#2563EB"/>
    <text x="962" y="508" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Gemini</text>
  </g>
</svg>
